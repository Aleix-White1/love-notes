services:
  - type: web
    name: love-notes
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/index.js
    healthCheckPath: /api/notes
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/server/data
    disk:
      name: love-notes-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
